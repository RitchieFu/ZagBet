<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"></meta>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" ></meta>
  <title>ZagBet</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f6f4f2;
      color: #1a1a1a;
    }
    .site-header {
      padding: 1.25rem 1.5rem;
      flex-shrink: 0;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }
    .zag {
      color: #800020;
    }
    .bet {
      color: #001f3f;
    }
    .game-modules {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      padding: 1rem 1.5rem 2rem;
      align-content: stretch;
      min-height: 0;
    }
    .module-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 12rem;
      padding: 1.5rem;
      background: #fff;
      border: 2px solid #e0dcd6;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      font-size: 1.25rem;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .module-card:hover {
      border-color: #c4bdb3;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    .module-card:focus-visible {
      outline: 3px solid #001f3f;
      outline-offset: 3px;
    }
    @media (max-width: 720px) {
      .game-modules {
        grid-template-columns: 1fr;
      }
      .module-card {
        min-height: 10rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1><span class="zag">Zag</span><span class="bet">Bet</span></h1>
  </header>
  <main class="game-modules">
    <a class="module-card" href="#">HiLo</a>
    <a class="module-card" href="#">Cross The Road</a>
    <a class="module-card" href="#">Mines</a>
  </main>
</body>
</html>
