name: CI

on:
  pull_request:
    paths:
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
      - "README.md"
      - "public/**"
  push:
    branches:
      - main
    paths:
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
      - "README.md"
      - "public/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate HTML
        run: npm run validate:html
