<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross the road — ZagBet</title>
  <link rel="stylesheet" href="session.css">
  <link rel="stylesheet" href="site.css">
  <style>
    .play-area {
      position: relative;
    }
    #duck {
      position: absolute;
      left: 1.5rem;
      bottom: 5.5rem;
      max-height: 96px;
      width: auto;
      display: block;
      transition: transform 0.2s ease-out;
    }
    #jump {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 1rem 1.5rem;
      border: none;
      background: #c41e3a;
      color: #fff;
      font-size: 1.125rem;
      font-weight: 700;
      cursor: pointer;
    }
    #jump:hover {
      background: #a01830;
    }
    #jump:focus-visible {
      outline: 3px solid #001f3f;
      outline-offset: -3px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1><a class="site-header__logo" href="index.html"><span class="zag">Zag</span><span class="bet">Bet</span></a></h1>
    <div class="session-panel" id="session-panel" hidden>
      <span class="session-panel__name" id="session-player-name"></span>
      <span class="session-panel__balance" id="session-balance"></span>
    </div>
  </header>

  <div class="play-area">
    <img id="duck" src="media/duck.png" alt="Duck">
  </div>

  <button type="button" id="jump">Jump</button>

  <script type="module" src="session.js"></script>
  <script type="module" src="crosstheroad.page.js"></script>
</body>
</html>
