<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" >
  <title>ZagBet</title>
  <link rel="stylesheet" href="session.css">
  <link rel="stylesheet" href="site.css">
  <style>
    .game-modules {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      padding: 1rem 1.5rem 2rem;
      align-content: stretch;
      min-height: 0;
    }
    .module-card {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-height: 14rem;
      padding: 1.25rem 1.25rem 1.5rem;
      background: #fff;
      border: 2px solid #e0dcd6;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .module-card__title {
      font-size: clamp(1.5rem, 3vw, 1.85rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .module-card__photo {
      flex: 1;
      min-height: 7.5rem;
      margin-top: 1rem;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      background: #f0ece6;
    }
    .module-card__photo img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .module-card:hover {
      border-color: #800020;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    .module-card:focus-visible {
      outline: 3px solid #001f3f;
      outline-offset: 3px;
    }
    @media (max-width: 720px) {
      .game-modules {
        grid-template-columns: 1fr;
      }
      .module-card {
        min-height: 13rem;
      }
      .module-card__photo {
        min-height: 6.5rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1><a class="site-header__logo" href="index.html"><span class="zag">Zag</span><span class="bet">Bet</span></a></h1>
    <div class="session-panel" id="session-panel" hidden>
      <span class="session-panel__name" id="session-player-name"></span>
      <span class="session-panel__balance" id="session-balance"></span>
    </div>
  </header>
  <main class="game-modules">
    <a class="module-card" href="hilo.html">
      <span class="module-card__title">HiLo</span>
      <div class="module-card__photo"></div>
    </a>
    <a class="module-card" href="crosstheroad.html">
      <span class="module-card__title">Cross The Road</span>
      <div class="module-card__photo"><img id="cross_the_road_cover" src="media/cross_the_road_cover.jpg" alt="Duck On the Street"></div>
    </a>
    <a class="module-card" href="mines.html">
      <span class="module-card__title">Mines</span>
      <div class="module-card__photo"><img id="mines_cover" src="media/mines_cover.jpg" alt="Mines"></div>
    </a>
  </main>
  <script type="module" src="session.js"></script>
</body>
</html>
